    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }
    
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .slide-up { animation: slideUp 0.4s ease-out; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
    }
    
    .card-hover {
      transition: all 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }
    
    .btn-primary {
      background: #000;
      color: #fff;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: #333;
      transform: scale(1.02);
    }
    
    .btn-secondary {
      background: #fff;
      color: #000;
      border: 1px solid #000;
      transition: all 0.3s ease;
    }
    .btn-secondary:hover {
      background: #f5f5f5;
    }
    
    .input-field {
      border: 1px solid #ddd;
      transition: all 0.3s ease;
    }
    .input-field:focus {
      border-color: #000;
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.1);
      outline: none;
    }
    
    .nav-link {
      position: relative;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: #000;
      transition: width 0.3s ease;
    }
    .nav-link:hover::after {
      width: 100%;
    }
    
    .perfume-bottle {
      background: linear-gradient(135deg, #f8f8f8 0%, #e8e8e8 100%);
    }
    
    .toast {
      animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 2.7s;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: skeleton 1.5s infinite;
    }
    @keyframes skeleton {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #999; }
  </style>

        window.dataSdk = {
        
          async init(handler) {
            const colRef = collection(db, 'tienda_data');
            onSnapshot(colRef, (snapshot) => {
              const data = snapshot.docs.map(doc => ({
                ...doc.data(),
                __backendId: doc.id
              }));
              handler.onDataChanged(data);
            });
            return { isOk: true };
          },
          
          async create(data) {
            try {
              const docRef = await addDoc(collection(db, 'tienda_data'), data);
              return { isOk: true, data: { ...data, __backendId: docRef.id } };
            } catch (e) {
              console.error("Error al crear documento: ", e);
              return { isOk: false };
            }
          },
          
          async update(data) {
            try {
              const dataToUpdate = { ...data };
              const id = dataToUpdate.__backendId;
              delete dataToUpdate.__backendId; 
              await updateDoc(doc(db, 'tienda_data', id), dataToUpdate);
              return { isOk: true };
            } catch (e) {
              console.error("Error al actualizar documento: ", e);
              return { isOk: false };
            }
          },
          
          async delete(data) {
            try {
              await deleteDoc(doc(db, 'tienda_data', data.__backendId));
              return { isOk: true };
            } catch (e) {
              console.error("Error al eliminar documento: ", e);
              return { isOk: false };
            }
          }
        };

        // Iniciar la escucha a la base de datos con tu handler
        const result = await window.dataSdk.init(dataHandler);
        if (!result.isOk) {
            throw new Error('Fallo al inicializar Firebase SDK');
        }

      } catch(error) {
        console.error('Error cargando Firebase:', error);
        isLoading = false;
        renderCurrentView();
      }

    function hashPassword(password) {
      let hash = 0;
      for (let i = 0; i < password.length; i++) {
        const char = password.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return 'hash_' + Math.abs(hash).toString(16);
    }

    // Función mágica para previsualizar imágenes antes de guardar
    window.updateImagePreview = function(input, imgId, isFile) {
      const imgEl = document.getElementById(imgId);
      if (!imgEl) return;

      if (isFile) {
        // Si el usuario selecciona un archivo desde su PC/Celular
        if (input.files && input.files[0]) {
          const reader = new FileReader();
          reader.onload = function(e) {
            imgEl.src = e.target.result;
            imgEl.classList.remove('hidden'); // Mostramos la imagen si estaba oculta
          };
          reader.readAsDataURL(input.files[0]);
        }
      } else {
        // Si el usuario pega una URL
        const url = input.value.trim();
        if (url) {
          imgEl.src = url;
          imgEl.classList.remove('hidden');
        }
      }
    };

    async function saveSiteSettings(e) {
      e.preventDefault();
      const btn = document.getElementById('save-design-btn');

      // 🧠 NUEVO MOTOR INTELIGENTE PARA IMÁGENES
      // Decide automáticamente si guarda la foto nueva, la URL nueva, o mantiene la que ya existía.
      async function getFinalImage(inputId, fileId, currentImage) {
        let finalImage = currentImage || ''; 
        
        // 1. Si el usuario subió un archivo desde su computadora (Tiene máxima prioridad)
        const fileEl = document.getElementById(fileId);
        if (fileEl && fileEl.files && fileEl.files[0]) {
          try {
            return await processImageFile(fileEl.files[0]);
          } catch(err) {
            console.error("Error procesando imagen:", err);
          }
        }
        
        // 2. Si el usuario pegó una URL manual de internet
        const inputEl = document.getElementById(inputId);
        if (inputEl && inputEl.value.trim() !== '' && !inputEl.value.startsWith('data:image')) {
          return inputEl.value.trim();
        }
        
        // 3. Si no subió ni pegó nada, devolvemos la imagen intacta que ya estaba guardada
        return finalImage;
      }

      // Procesamos absolutamente todas las imágenes con el motor inteligente
      const homeImg = await getFinalImage('set-home-img-url', 'set-home-img-file', siteSettings.homeImage);
      const homeBgImg = await getFinalImage('set-home-bg-url', 'set-home-bg-file', siteSettings.homeBackgroundImage);
      const logoImg = await getFinalImage('set-logo-url', 'set-logo-file', siteSettings.logoUrl);
      const aboutImg = await getFinalImage('set-about-img-url', 'set-about-img-file', siteSettings.aboutImage);
      const footerLogoImg = await getFinalImage('set-footer-logo-url', 'set-footer-logo-file', siteSettings.footerLogoUrl);

      // Recopilar categorías
      const catCards = document.querySelectorAll('.admin-cat-card');
      const newCategories = [];
      catCards.forEach(card => {
        newCategories.push({
          name: card.querySelector('.cat-name').value.trim(),
          desc: card.querySelector('.cat-desc').value.trim(),
          filter: card.querySelector('.cat-filter').value.trim(),
          icon: card.querySelector('.cat-icon').value.trim(),
          color1: card.querySelector('.cat-color1').value,
          color2: card.querySelector('.cat-color2').value
        });
      });

      // Recopilar toda la información para enviarla a Firebase
      const updatedSettings = {
        ...siteSettings,
        primaryColor: document.getElementById('set-primary-color').value,
        storeName: document.getElementById('set-store-name').value.trim(),
        storeTagline: document.getElementById('set-store-tagline').value.trim(),
        logoUrl: logoImg, // <--- Aquí se guarda el logo seguro
        homeTitle: document.getElementById('set-home-title').value,
        homeSubtitle: document.getElementById('set-home-subtitle').value,
        homeBgColor: document.getElementById('set-home-bg').value,
        homeImage: homeImg,
        homeBackgroundImage: homeBgImg,
        aboutTitle: document.getElementById('set-about-title').value,
        aboutSubtitle: document.getElementById('set-about-subtitle').value,
        aboutImage: aboutImg,
        aboutMission: document.getElementById('set-about-mission').value,
        aboutVision: document.getElementById('set-about-vision').value,
        categories: newCategories,
        instagramUrl: document.getElementById('set-instagram-url').value.trim(),
        whatsappNumber: document.getElementById('set-whatsapp-number').value.trim(),
        whatsappMessage: document.getElementById('set-whatsapp-message').value.trim(),
        contactEmail: document.getElementById('set-contact-email').value.trim(),
        contactAddress: document.getElementById('set-contact-address').value.trim(),
        footerStoreName: document.getElementById('set-footer-name') ? document.getElementById('set-footer-name').value.trim() : '',
        footerTagline: document.getElementById('set-footer-tagline') ? document.getElementById('set-footer-tagline').value.trim() : '',
        footerLogoUrl: footerLogoImg // <--- Aquí se guarda el logo del footer seguro
      };

      // Enviar a la base de datos
      if (window.dataSdk) {
        if (updatedSettings.__backendId) {
           await window.dataSdk.update(updatedSettings);
        } else {
           const res = await window.dataSdk.create(updatedSettings);
           if(res.isOk) updatedSettings.__backendId = res.data.__backendId;
        }
      }
      
      // Aplicar los cambios en pantalla en tiempo real
      siteSettings = updatedSettings;
      applyTheme(); 
      
      showToast('Apariencia guardada correctamente');
      btn.disabled = false;
      btn.textContent = 'Guardar Diseño y Textos';
    }

    // Función para comprimir y convertir imágenes locales a Base64
   // Función para comprimir y convertir imágenes locales a Base64 (Soporta PNG transparente)
   function processImageFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800; // Redimensionar para no saturar la base de datos
            const MAX_HEIGHT = 800;
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > MAX_WIDTH) {
                height *= MAX_WIDTH / width;
                width = MAX_WIDTH;
              }
            } else {
              if (height > MAX_HEIGHT) {
                width *= MAX_HEIGHT / height;
                height = MAX_HEIGHT;
              }
            }
            
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            
            // Limpiamos el canvas explícitamente para asegurar que el fondo sea transparente
            ctx.clearRect(0, 0, width, height);
            
            // Dibujamos la imagen
            ctx.drawImage(img, 0, 0, width, height);
            
            // MAGIA AQUÍ: Si el archivo subido es PNG, lo guardamos como PNG para mantener la transparencia
            if (file.type === 'image/png') {
              resolve(canvas.toDataURL('image/png')); 
            } else {
              // Si es JPG u otro formato, lo guardamos comprimido
              resolve(canvas.toDataURL('image/jpeg', 0.8)); 
            }
          };
        };
        reader.onerror = error => reject(error);
      });
    }

      const user = appData.users.find(u => u.email === email && u.password === hashedPassword);
      
      if (user) {
        currentUser = user;
        closeAuthModal();
        showToast(`¡Bienvenido, ${user.name}!`);
        updateUserDropdown();
        loadUserCart();
        renderCurrentView();
      } else {
        showToast('Credenciales incorrectas', 'error');
        btn.disabled = false;
        btn.textContent = 'Iniciar Sesión';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('register-name').value.trim();
      const email = document.getElementById('register-email').value.trim();
      const password = document.getElementById('register-password').value;
      const confirm = document.getElementById('register-confirm').value;
      const btn = document.getElementById('register-btn');
      
      if (!validateEmail(email)) {
        showToast('Correo electrónico inválido', 'error');
        return;
      }
      
      if (password !== confirm) {
        showToast('Las contraseñas no coinciden', 'error');
        return;
      }
      
      if (password.length < 6) {
        showToast('La contraseña debe tener al menos 6 caracteres', 'error');
        return;
      }
      
      if (appData.users.find(u => u.email === email)) {
        showToast('Este correo ya está registrado', 'error');
        return;
      }
      
      if (appData.users.length >= 999) {
        showToast('Límite de usuarios alcanzado', 'error');
        return;
      }
      
      btn.disabled = true;
      btn.innerHTML = '<span class="inline-block animate-spin mr-2">⟳</span> Creando cuenta...';
      
      const result = await window.dataSdk.create({
        type: 'user',
        name,
        email,
        password: hashPassword(password),
        role: 'customer',
        createdAt: new Date().toISOString()
      });
      
      if (result.isOk) {
        showToast('¡Cuenta creada exitosamente!');
        openAuthModal('login');
      } else {
        showToast('Error al crear la cuenta', 'error');
        btn.disabled = false;
        btn.textContent = 'Crear Cuenta';
      }
    }

    function logout() {
      currentUser = null;
      cart = [];
      updateCartCount();
      updateUserDropdown();
      navigateTo('home');

    }


    async function handleGoogleLogin() {
      if (!window.firebaseAuth || !window.googleProvider) {
        showToast('Firebase Auth se está conectando, intenta de nuevo...', 'info');
        return;
      }

      try {
        const { signInWithPopup } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js");
        const result = await signInWithPopup(window.firebaseAuth, window.googleProvider);
        const user = result.user;

        let dbUser = appData.users.find(u => u.email === user.email);

        if (!dbUser) {
          const newUser = {
            type: 'user',
            name: user.displayName,
            email: user.email,
            password: 'google_auth',
            role: 'customer',
            createdAt: new Date().toISOString()
          };
          
          if (window.dataSdk) {
            const createRes = await window.dataSdk.create(newUser);
            if (createRes.isOk) {
               dbUser = createRes.data;
            }
          }
        }

        if (dbUser) {
          currentUser = dbUser;
          closeAuthModal();
          showToast(`¡Bienvenido, ${dbUser.name}!`);
          updateUserDropdown();
          loadUserCart();
          renderCurrentView();
        }

      } catch (error) {
        console.error("Detalle del error de Google:", error);
        
        // Traducimos los errores más comunes para que sepas qué arreglar
        if (error.code === 'auth/popup-closed-by-user') {
          showToast('Cancelaste el inicio de sesión', 'info');
        } else if (error.code === 'auth/unauthorized-domain') {
          showToast('⚠️ Dominio no autorizado en Firebase. Revisa la consola.', 'error');
        } else if (error.code === 'auth/configuration-not-found') {
          showToast('⚠️ Google no está habilitado en Firebase Auth.', 'error');
        } else {
          showToast('Error: ' + error.message, 'error');
        }
      }
    }

    function updateCartCount() {
      const countEl = document.getElementById('cart-count');
      const total = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
      if (total > 0) {
        countEl.textContent = total;
        countEl.classList.remove('hidden');
      } else {

    async function addToCart(productIndex) {
      if (!currentUser) {
        showToast('Inicia sesión para agregar al carrito', 'info');
        openAuthModal('login');
        return;
      }
      
      const product = appData.products[productIndex] || { ...sampleProducts[productIndex], __backendId: String(productIndex) };
      
      if (product.stock <= 0) {
        showToast('Producto agotado', 'error');
        return;
      }
      
      const existingItem = cart.find(item => item.productId === product.__backendId);
      
      if (existingItem) {
        // Validamos que no supere el stock disponible
        if ((existingItem.quantity || 1) + 1 > product.stock) {
          showToast(`Solo hay ${product.stock} unidades disponibles`, 'error');
          return;
        }
        
        existingItem.quantity = (existingItem.quantity || 1) + 1;
        if (existingItem.__backendId && window.dataSdk) {
          await window.dataSdk.update(existingItem);
        }
      } else {
        const newItem = {
          type: 'cartItem',
          userId: currentUser.__backendId,
          productId: product.__backendId,
          productName: product.name || product.productName,
          brand: product.brand,
          price: product.price,
          quantity: 1,
          imageUrl: product.imageUrl,
          imageIndex: productIndex
        };
        
        cart.push(newItem);
        
        if (window.dataSdk && appData.cartItems.length < 999) {
          await window.dataSdk.create(newItem);
        }
      }
      
      updateCartCount();
      showToast('Producto agregado al carrito');
    }

    async function updateCartQuantity(index, delta) {
      const item = cart[index];
      if (!item) return;
      
      // Buscamos el producto en la base de datos para saber cuánto stock real queda
      const product = appData.products.find(p => p.__backendId === item.productId) || sampleProducts[item.imageIndex];
      const newQuantity = (item.quantity || 1) + delta;
      
      if (newQuantity <= 0) {
        await removeFromCart(index);
        return;
      }
      
      // Validamos contra el stock
      if (product && newQuantity > product.stock) {
        showToast(`Solo quedan ${product.stock} unidades disponibles`, 'error');
        return;
      }
      
      item.quantity = newQuantity;
      
      if (item.__backendId && window.dataSdk) {
        await window.dataSdk.update(item);
      }
      
      renderCartItems();
      updateCartCount();
    }

    async function removeFromCart(index) {
      const item = cart[index];
      if (!item) return;
      
      cart.splice(index, 1);
      
      if (item.__backendId && window.dataSdk) {
        await window.dataSdk.delete(item);
      }
      
      renderCartItems();
      updateCartCount();
      showToast('Producto eliminado');
    }

        return;

      container.innerHTML = cart.map((item, index) => `

              <button onclick="updateCartQuantity(${index}, -1)" class="w-7 h-7 bg-gray-100 hover:bg-gray-200 rounded-full flex items-center justify-center transition-colors">−</button>
              <span class="text-sm font-medium w-6 text-center">${item.quantity || 1}</span>
              <button onclick="updateCartQuantity(${index}, 1)" class="w-7 h-7 bg-gray-100 hover:bg-gray-200 rounded-full flex items-center justify-center transition-colors">+</button>

            </div>
          </div>
        </div>
      `).join('');
      
      const total = cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0);
      
      footer.innerHTML = `
        <div class="flex justify-between items-center mb-4">
          <span class="text-gray-600">Subtotal</span>

        </button>
        <button onclick="closeCart()" class="btn-secondary w-full py-3 rounded-lg font-medium mt-2">

        </button>
      `;
    }

window.generateAdminStatsHTML = function() {
  const products = appData.products.length > 0 ? appData.products : sampleProducts;
  const safeOrders = appData.orders || [];
  
  // 1. Obtenemos el mes y el año en curso
  const now = new Date();
  const currentMonth = now.getMonth();
  const currentYear = now.getFullYear();
  
  // 2. Filtramos pedidos que estén COMPLETADOS y que se hayan hecho ESTE MES
  const completedOrdersThisMonth = safeOrders.filter(o => {
    if (o.status !== 'completado') return false; // Solo los completados
    if (!o.createdAt) return false; // Protección por si hay datos viejos sin fecha
    
    const orderDate = new Date(o.createdAt);
    // Verificamos que coincida el mes y el año
    return orderDate.getMonth() === currentMonth && orderDate.getFullYear() === currentYear;
  });
  
  // 3. Sumamos solo los ingresos del mes en curso
  const totalRevenue = completedOrdersThisMonth.reduce((sum, o) => sum + (parseFloat(o.total) || 0), 0);

  // 4. Calculamos los pedidos activos (Omitiendo los ya completados y los cancelados)
  const activeOrdersCount = safeOrders.filter(o => o.status !== 'completado' && o.status !== 'cancelado').length;
  
  return [
    { label: 'Productos', value: products.length, icon: '📦', color: 'bg-blue-50' },
    { label: 'Usuarios', value: appData.users.length, icon: '👥', color: 'bg-green-50' },
    { label: 'Pedidos Activos', value: activeOrdersCount, icon: '🛒', color: 'bg-amber-50' },
    { label: 'Ingresos (Mes)', value: formatPrice(totalRevenue), icon: '💰', color: 'bg-purple-50' } // Cambié el texto a "Ingresos (Mes)"
  ].map(stat => `
    <div class="${stat.color} rounded-xl p-6 shadow-sm transition-all duration-300">
      <div class="flex items-center gap-3 mb-2">
        <span class="text-2xl">${stat.icon}</span>
        <span class="text-sm text-gray-600 font-medium">${stat.label}</span>
      </div>
      <p class="text-2xl font-bold text-gray-900">${stat.value}</p>
    </div>
  `).join('');
};

function switchAdminTab(tab) {
  currentAdminTab = tab;
  
  // Actualizar colores de las pestañas
  document.querySelectorAll('.admin-tab').forEach(t => {
    t.classList.remove('border-black', 'text-black');
    t.classList.add('border-transparent', 'text-gray-500');
  });
  const activeTab = document.getElementById(`tab-${tab}`);
  if (activeTab) {
    activeTab.classList.remove('border-transparent', 'text-gray-500');
    activeTab.classList.add('border-black', 'text-black');
  }
  
  // Renderizar el contenido con protección anti-errores
  const content = document.getElementById('admin-content');
  if (content) {
    try {
      switch (tab) {
        case 'products': content.innerHTML = renderAdminProducts(); break;
        case 'users': content.innerHTML = renderAdminUsers(); break;
        case 'orders': content.innerHTML = renderAdminOrders(); break;
        case 'history': content.innerHTML = renderAdminHistory(); break;
        case 'receipts': content.innerHTML = renderAdminReceipts(); break;
        case 'design': content.innerHTML = renderAdminDesign(); break;
      }
    } catch (error) {
      console.error("Error al cambiar de pestaña:", error);
      content.innerHTML = `<div class="p-6 bg-red-50 text-red-600 rounded-xl border border-red-200">
                <h3 class="font-bold mb-2">⚠️ Ocurrió un error al cargar esta sección</h3>
                <p class="text-sm">${error.message}</p>
              </div>`;
    }
  }
}

      btn.innerHTML = '<span class="inline-block animate-spin mr-2">⟳</span> Guardando...';

      const urlInput = document.getElementById('prod-image-url');

        try {
          finalImageUrl = await processImageFile(fileInput.files[0]);
        } catch (error) {
          showToast('Error al procesar la imagen local', 'error');
          btn.disabled = false;
          btn.textContent = editingProductIndex !== null ? 'Guardar Cambios' : 'Crear Producto';
          return;
        }

      const productData = {
        type: 'product',
        productName: document.getElementById('prod-name').value.trim(),
        brand: document.getElementById('prod-brand').value.trim(),
        price: parseFloat(document.getElementById('prod-price').value),
        stock: parseInt(document.getElementById('prod-stock').value),
        category: document.getElementById('prod-category').value,
        description: document.getElementById('prod-desc').value.trim(),
        notes: document.getElementById('prod-notes').value.trim(),
        imageUrl: finalImageUrl,
        bgColor: document.getElementById('prod-bg-color').value, // <--- Guardamos el color aquí
        imageIndex: editingProductIndex !== null && appData.products[editingProductIndex] ? appData.products[editingProductIndex].imageIndex : Math.floor(Math.random() * 8)
      };
      
      if (window.dataSdk) {
        if (editingProductIndex !== null && appData.products[editingProductIndex]) {
          const existingProduct = appData.products[editingProductIndex];
          const result = await window.dataSdk.update({ ...existingProduct, ...productData });
          if (result.isOk) {
            showToast('Producto actualizado');
            closeProductForm();
          } else { 
            showToast('Error al actualizar', 'error'); 
          }
        } else {
          const result = await window.dataSdk.create(productData);
          if (result.isOk) {
            showToast('Producto creado');
            closeProductForm();
          } else { 
            showToast('Error al crear', 'error'); 
          }
        }
      }
      btn.disabled = false;
    }

    async function deleteUser(userId) {
      // 1. Candado de seguridad extra: Evitar que el admin activo se borre a sí mismo
      if (currentUser && currentUser.__backendId === userId) {
        showToast('Acción denegada: No puedes eliminar tu propia cuenta', 'error');
        return;
      }
      
      // 2. Pedir confirmación al administrador antes de borrar
      const confirmDelete = confirm('¿Estás seguro de que deseas eliminar a este usuario de forma permanente? Se perderá su acceso a la tienda.');
      if (!confirmDelete) return;
      
      // 3. Buscar el usuario en la lista de datos local
      const userToDelete = appData.users.find(u => u.__backendId === userId);
      
      if (userToDelete && window.dataSdk) {
        // 4. Enviar la orden de eliminación a Firebase
        const result = await window.dataSdk.delete(userToDelete);
        
        if (result.isOk) {
          showToast('Usuario eliminado correctamente');
          // No necesitamos volver a renderizar manualmente, 
          // Firebase detectará el cambio y actualizará la pantalla solo.
        } else {
          showToast('Error al eliminar el usuario', 'error');
        }
      }
    }

              <tbody class="divide-y divide-gray-200">

                      <td class="px-4 py-4 font-medium">#${order.__backendId.slice(-6).toUpperCase()}</td>

                          <option value="procesando" ${order.status === 'procesando' ? 'selected' : ''}>Procesando</option>

                          Ver Detalles
                        </button>
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `}
      `;
    }

    // NUEVA FUNCIÓN: Dibuja el historial de ventas completadas
    function renderAdminHistory() {
      const completedOrders = appData.orders.filter(o => o.status === 'completado');

        <div class="mb-6 flex justify-between items-end">
          <div>
            <h2 class="font-semibold text-lg text-green-700 flex items-center gap-2"><span class="text-2xl">🎉</span> Historial de Ventas</h2>
            <p class="text-gray-500 text-sm">Pedidos entregados satisfactoriamente.</p>
          </div>
          <div class="text-right">
            <p class="text-xs text-gray-500 uppercase tracking-wider font-bold">Ingresos Totales</p>
            <p class="font-display text-2xl font-bold">${formatPrice(totalEarned)}</p>
          </div>
        </div>
        
        ${completedOrders.length === 0 ? `
          <div class="text-center py-12 bg-gray-50 rounded-xl">
            <p class="text-gray-500">Aún no hay pedidos completados.</p>
          </div>
        ` : `
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Pedido</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Cliente</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Total</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Fecha</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-200">
                ${completedOrders.map((order) => {
                  const customer = appData.users.find(u => u.__backendId === order.userId);
                  return `
                    <tr class="hover:bg-gray-50">
                      <td class="px-4 py-4 font-medium">#${order.__backendId.slice(-6).toUpperCase()}</td>
                      <td class="px-4 py-4 text-gray-600">${customer?.name || 'Desconocido'}</td>
                      <td class="px-4 py-4 font-medium text-green-700">${formatPrice(order.total)}</td>
                      <td class="px-4 py-4 text-gray-600">
                        ${order.createdAt ? new Date(order.createdAt).toLocaleDateString('es-MX') : 'N/A'}
                      </td>
                      <td class="px-4 py-4 flex gap-2">
                        <button onclick="viewOrderDetails('${order.__backendId}')" class="px-3 py-1 text-sm bg-gray-100 hover:bg-gray-200 rounded transition-colors border border-gray-200">
                          Ver Detalles

                        <select onchange="updateOrderStatusById('${order.__backendId}', this.value)" class="px-2 py-1 rounded border border-gray-200 text-xs bg-white text-gray-500">

    // ACTUALIZACIÓN: Lógica de guardado de estado
    // Reemplaza a las versiones anteriores de updateOrderStatusById y updateOrderStatus
    async function updateOrderStatusById(orderId, status) {
      const order = appData.orders.find(o => o.__backendId === orderId);
      if (order && window.dataSdk) {
        order.status = status;
        const result = await window.dataSdk.update(order);
        if (result.isOk) {
          showToast('Estado del pedido actualizado');
          // Refresca la vista en la que estás parado actualmente (Pedidos, Historial o Comprobantes)
          switchAdminTab(currentAdminTab); 
        } else {
          showToast('Error al actualizar', 'error');
        }
      }
    }

      // Filtramos solo los pedidos que tienen método de transferencia y adjuntaron imagen
      const transferOrders = appData.orders.filter(o => o.paymentMethod === 'transfer' && o.receiptImage);

      return `
        <div class="mb-6">
          <h2 class="font-semibold text-lg">Validación de Transferencias</h2>
          <p class="text-gray-500 text-sm">Revisa los comprobantes subidos por los clientes para aprobar sus pedidos.</p>
        </div>
        
        ${transferOrders.length === 0 ? `
          <div class="text-center py-16 bg-gray-50 rounded-xl border border-dashed border-gray-300">
            <p class="text-gray-500 font-medium">No hay comprobantes pendientes de validación</p>
          </div>
        ` : `
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            ${transferOrders.map((order) => {
              const customer = appData.users.find(u => u.__backendId === order.userId);
              return `
                <div class="bg-white rounded-xl p-5 border border-gray-200 shadow-sm flex flex-col">
                  <div class="flex justify-between items-start mb-4">
                    <div>
                      <p class="font-medium text-sm">Pedido #${order.__backendId.slice(-6).toUpperCase()}</p>
                      <p class="text-xs text-gray-500">${customer?.name || 'Cliente'}</p>
                    </div>
                    <span class="font-semibold text-sm bg-gray-100 px-2 py-1 rounded">${formatPrice(order.total)}</span>
                  </div>
                  
                  <details class="group mb-4">
                    <summary class="cursor-pointer text-sm text-blue-600 hover:text-blue-800 font-medium list-none flex items-center gap-2 select-none">
                      <span class="bg-blue-50 px-2 py-1 rounded text-xs transition-transform group-open:rotate-180">▼</span>
                      Mostrar / Ocultar Comprobante
                    </summary>
                    
                    <div class="mt-3 relative aspect-video bg-gray-50 rounded-lg border border-gray-200 overflow-hidden flex items-center justify-center cursor-pointer hover:opacity-90 transition-opacity" onclick="viewReceiptImage('${order.receiptImage}')" title="Haz clic para ver en pantalla completa">
                      <img src="${order.receiptImage}" class="w-full h-full object-contain">
                      <div class="absolute bottom-2 right-2 bg-black/60 text-white text-[10px] px-2 py-1 rounded-md backdrop-blur-sm pointer-events-none">
                        🔍 Ampliar
                      </div>
                    </div>
                  </details>
                  <div class="mt-auto pt-4 border-t border-gray-100 flex items-center justify-between gap-2">
                    <span class="px-2 py-1 ${order.status === 'validando pago' ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-gray-700'} rounded-full text-[10px] font-medium capitalize whitespace-nowrap">
                      ${order.status}
                    </span>
                    <select onchange="updateOrderStatusById('${order.__backendId}', this.value)" class="text-xs border border-gray-300 rounded px-2 py-1.5 focus:border-black outline-none bg-white w-full max-w-[140px]">
                      <option value="validando pago" ${order.status === 'validando pago' ? 'selected' : ''}>⏳ Pendiente</option>
                      <option value="procesando" ${order.status === 'procesando' ? 'selected' : ''}>✅ Aprobar Pago</option>
                      <option value="cancelado" ${order.status === 'cancelado' ? 'selected' : ''}>❌ Rechazar</option>
                    </select>
                  </div>
                </div>
              `;
            }).join('')}
          </div>

    }
    // Función para abrir la imagen del comprobante en pantalla completa
    function viewReceiptImage(imageUrl) {
      const overlay = document.createElement('div');
      overlay.className = 'fixed inset-0 z-[100] flex items-center justify-center bg-black/90 p-4 fade-in cursor-pointer';
      overlay.onclick = () => overlay.remove(); // Se cierra al tocar en cualquier lado
      overlay.innerHTML = `
        <div class="relative max-w-3xl w-full h-full flex items-center justify-center">
          <button class="absolute top-4 right-4 text-white hover:text-gray-300 p-2 bg-black/50 rounded-full font-bold">✕ CERRAR</button>
          <img src="${imageUrl}" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl object-contain">
        </div>
      `;
      document.body.appendChild(overlay);
    }

    // Actualiza el estado usando el ID directo de Firebase (más seguro que el índice)
    async function updateOrderStatusById(orderId, status) {
      const order = appData.orders.find(o => o.__backendId === orderId);
      if (order && window.dataSdk) {
        order.status = status;
        const result = await window.dataSdk.update(order);
        if (result.isOk) {
          showToast('Estado del pedido actualizado');
          // Ya no necesitamos forzar el cambio de pestaña manualmente, 
          // Firebase recargará la pantalla y nuestro nuevo código nos mantendrá aquí.
        } else {
          showToast('Error al actualizar', 'error');
        }
      }
    }

    async function updateOrderStatus(index, status) {
      const order = appData.orders[index];
      if (order && window.dataSdk) {
        order.status = status;
        const result = await window.dataSdk.update(order);
        if (result.isOk) {
          showToast('Estado actualizado');
        } else {
          showToast('Error al actualizar', 'error');
        }
      }
    }

    function viewOrderDetails(orderId) {
      const order = appData.orders.find(o => o.__backendId === orderId);
      if (!order) return;
      
      const customer = appData.users.find(u => u.__backendId === order.userId);
      const dateStr = order.createdAt ? new Date(order.createdAt).toLocaleString('es-MX') : 'N/A';
      const paymentMethodStr = order.paymentMethod === 'transfer' ? 'Transferencia Bancaria' : 'Tarjeta de Crédito/Débito';
      
      // Variable para saber si quien está viendo esto es el Admin
      const isAdmin = currentUser && currentUser.role === 'admin';

      const overlay = document.createElement('div');
      overlay.id = 'order-details-modal';
      overlay.className = 'fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 fade-in';
      
      window.closeOrderDetails = function() {
        const el = document.getElementById('order-details-modal');
        if (el) el.remove();
      };

      overlay.onclick = (e) => {
        if (e.target === overlay) window.closeOrderDetails();
      };

      overlay.innerHTML = `
        <div class="bg-white rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl slide-up flex flex-col max-h-[90vh]">
          
          <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <h3 class="font-display text-xl font-semibold">Detalles del Pedido</h3>
            <button onclick="closeOrderDetails()" class="text-gray-400 hover:bg-gray-200 p-1 rounded-full transition-colors">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          
          <div class="p-6 overflow-y-auto flex-1">
            
            <div class="flex justify-between items-start mb-6">
              <div>
                <p class="text-sm text-gray-500">ID del Pedido</p>
                <p class="font-medium text-lg">#${order.__backendId.slice(-6).toUpperCase()}</p>
              </div>
              <div class="text-right">
                <span class="inline-block px-3 py-1 rounded-full text-xs font-medium capitalize ${
                  order.status === 'completado' ? 'bg-green-100 text-green-700' :
                  order.status === 'enviado' ? 'bg-blue-100 text-blue-700' :
                  order.status === 'procesando' ? 'bg-indigo-100 text-indigo-700' :
                  order.status === 'validando pago' ? 'bg-amber-100 text-amber-700' :
                  'bg-gray-100 text-gray-700'
                }">${order.status}</span>
                <p class="text-xs text-gray-500 mt-1">${dateStr}</p>
              </div>
            </div>

            <div class="bg-gray-50 rounded-xl p-4 mb-6 space-y-3 border border-gray-100">
              <div>
                <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-1">Datos del Cliente</p>
                <p class="text-sm font-medium">${customer?.name || 'Cliente Eliminado'}</p>
                <p class="text-sm text-gray-600">${customer?.email || 'N/A'}</p>
              </div>
              <div class="pt-3 border-t border-gray-200">
                <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-2">Dirección de Envío</p>
                <p class="text-sm text-gray-800"><strong>Calle y N°:</strong> ${order.address || 'No especificada'}</p>
                <p class="text-sm text-gray-800 mt-1"><strong>Barrio/Col:</strong> ${order.neighborhood || '-'} &nbsp;&nbsp;|&nbsp;&nbsp; <strong>C.P:</strong> ${order.zip || '-'}</p>
                <p class="text-sm text-gray-600 mt-1 bg-white p-2 rounded border border-gray-100"><strong>Ref:</strong> ${order.reference || 'Sin referencias'}</p>
                <p class="text-sm text-gray-800 mt-2 flex items-center gap-1 font-medium">📞 ${order.phone || 'No especificado'}</p>
              </div>
            </div>

            <div class="bg-blue-50/50 rounded-xl p-4 mb-6 border border-blue-100">
              <p class="text-xs text-blue-800 uppercase tracking-wider font-semibold mb-2">📦 Guía de Envío</p>
              
              ${order.shippingGuideUrl ? `
                <div class="flex items-center justify-between mb-2">
                  <span class="text-sm text-green-600 font-medium">✅ Guía adjunta al pedido</span>
                  <button onclick="viewReceiptImage('${order.shippingGuideUrl}')" class="text-xs bg-black text-white px-3 py-1.5 rounded hover:bg-gray-800 transition-colors flex items-center gap-1">
                    <span>📄</span> Ver Guía
                  </button>
                </div>
              ` : `
                <p class="text-sm text-gray-500 mb-2">Aún no se ha adjuntado la guía de paquetería.</p>
              `}

              ${isAdmin ? `
                <div class="pt-3 border-t border-blue-100 mt-2">
                  <label class="block text-xs text-gray-600 mb-1">${order.shippingGuideUrl ? 'Actualizar' : 'Subir'} Guía (Foto o Captura)</label>
                  <div class="flex gap-2 items-center">
                    <input type="file" id="guide-file-${order.__backendId}" accept="image/*" class="w-full text-xs text-gray-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200">
                    <button onclick="uploadShippingGuide('${order.__backendId}')" id="btn-guide-${order.__backendId}" class="bg-blue-600 text-white px-3 py-1.5 rounded text-xs font-medium hover:bg-blue-700 transition-colors">Guardar</button>
                  </div>
                </div>
              ` : ''}
            </div>
            <div class="bg-gray-50 rounded-xl p-4 mb-6 border border-gray-100">
              <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-1">Información de Pago</p>
              <div class="flex items-center gap-2">
                <span class="text-xl">${order.paymentMethod === 'transfer' ? '🏦' : '💳'}</span>
                <p class="text-sm font-medium">${paymentMethodStr}</p>
              </div>
              ${order.receiptImage ? `
                <button onclick="viewReceiptImage('${order.receiptImage}')" class="mt-3 text-sm text-blue-600 hover:text-blue-800 underline flex items-center gap-1">
                  <span>📸</span> Ver comprobante adjunto
                </button>
              ` : ''}
            </div>

            <div class="border-t border-gray-200 pt-4 flex justify-between items-center">
              <span class="font-semibold text-gray-700">Monto Pagado:</span>
              <span class="font-display text-2xl font-bold">${formatPrice(order.total)}</span>
            </div>
          </div>
          
          <div class="p-6 border-t border-gray-100 bg-gray-50">
             <button onclick="closeOrderDetails()" class="btn-primary w-full py-3 rounded-lg font-medium">Cerrar</button>
          </div>
        </div>
      `;

      document.body.appendChild(overlay);
    }

    // Función para que el Admin suba la foto de la guía
    async function uploadShippingGuide(orderId) {
      const fileInput = document.getElementById(`guide-file-${orderId}`);
      const btn = document.getElementById(`btn-guide-${orderId}`);
      
      if (!fileInput.files || fileInput.files.length === 0) {
        showToast('Selecciona una imagen o captura de la guía', 'error');
        return;
      }
      
      btn.disabled = true;
      btn.innerHTML = 'Subiendo...';
      
      try {
        // Comprimimos la imagen con nuestra función existente
        const guideBase64 = await processImageFile(fileInput.files[0]);
        const order = appData.orders.find(o => o.__backendId === orderId);
        
        if (order && window.dataSdk) {
          order.shippingGuideUrl = guideBase64;
          
          // Magia: Si el pedido estaba procesándose, lo pasamos a "enviado" automático
          if (order.status === 'procesando' || order.status === 'validando pago') {
            order.status = 'enviado';
          }
          
          const result = await window.dataSdk.update(order);
          if (result.isOk) {
            showToast('Guía de envío guardada exitosamente');
            closeOrderDetails();
            // Refresca la tabla del panel de admin
            if (typeof currentAdminTab !== 'undefined') switchAdminTab(currentAdminTab); 
          } else {
            showToast('Error al guardar la guía', 'error');
          }
        }
      } catch (error) {
        showToast('Error al procesar el archivo', 'error');
      }
      
      btn.disabled = false;
      btn.innerHTML = 'Guardar';
    }
    // Initialize
    updateUserDropdown();
  </script>
 </body>
